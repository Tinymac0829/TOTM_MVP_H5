<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>TOTM MVP</title>
    <style>
      :root {
        color-scheme: dark;
        background: #101820;
        color: #f5f1e8;
        font-family: Georgia, "Times New Roman", serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #101820;
      }

      body {
        display: grid;
        place-items: start;
        touch-action: none;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
        background: #18232d;
      }

      noscript {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #101820;
        color: #f5f1e8;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <canvas id="game-canvas" aria-label="TOTM MVP Canvas"></canvas>
    <noscript>此 H5 游戏原型需要启用 JavaScript。</noscript>
    <script type="module" src="./src/main.js?v=eng04_input_buffer_v1"></script>
  </body>
</html>
